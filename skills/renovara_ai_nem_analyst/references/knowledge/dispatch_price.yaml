DISPATCH_PRICE:
  table_name: silver_dispatchis_reports_dispatch_price
  display_name: Dispatch Price
  table_comment: DISPATCHPRICE records 5-minute dispatch prices for energy and FCAS, including whether
    an intervention has occurred, or price override (e.g. for Administered Price Cap). Updates occur every
    5 minutes. APCFLAG meanings are as follows Bit 5 (16) Price Scaling via Inter-regional Loss Factor
    (IRLF) Bit 4 (8) Price manually overwritten Bit 3 (4) MPC or MPF binding (ROP outside MPC/MPF) Bit
    2 (2) VoLL Override applied Bit 1 (1) APC or APF binding (ROP outside APC/APF) FCAS APCFLAG meanings
    are as follows Bit 4 (8) Price manually overwritten Bit 3 (4) MPC ($VoLL) or MPF ($zero) binding (ROP
    outside MPC/MPF) Bit 1 (1) APC or APF binding (ROP outside APC/APF) Where MPC = Market Price Cap,
    MPF = Market Price Floor, APC = Administered Price Cap, APF = Administered Price Floor
  primary_keys:
  - DISPATCHINTERVAL
  - INTERVENTION
  - REGIONID
  - RUNNO
  - SETTLEMENTDATE
  indexes:
  - LASTCHANGED
  visibility: Public
  update_frequency: Every 5 minutes
  schema:
  - column: SETTLEMENTDATE
    data_type: STRING
    comment: Market date and time (parsed to timestamp in silver). Timestamp is in AEST or Australia/Brisbane.
  - column: RUNNO
    data_type: SMALLINT
    comment: Dispatch run number; always 1
  - column: REGIONID
    data_type: STRING
    comment: Region Identifier
  - column: DISPATCHINTERVAL
    data_type: BIGINT
    comment: Dispatch interval identifier, format YYYYMMDDPPP (001–288).
  - column: INTERVENTION
    data_type: TINYINT
    comment: Manual intervention flag.
  - column: RRP
    data_type: DECIMAL(15,5)
    comment: Regional Reference Price for this dispatch period (used for settlement).
  - column: EEP
    data_type: DECIMAL(15,5)
    comment: Excess energy price (no longer used).
  - column: ROP
    data_type: DECIMAL(15,5)
    comment: Regional Override Price before any scaling, capping, or VoLL override.
  - column: APCFLAG
    data_type: SMALLINT
    comment: Administered Price Cap flag indicating post-processing adjustments.
  - column: MARKETSUSPENDEDFLAG
    data_type: SMALLINT
    comment: Indicates if market was suspended.
  - column: LASTCHANGED
    data_type: string
    comment: Timestamp of last record change.
  - column: RAISE6SECRRP
    data_type: DECIMAL(15,5)
    comment: RAISE 6SEC Regional Reference Price.
  - column: RAISE6SECROP
    data_type: DECIMAL(15,5)
    comment: RAISE 6SEC Regional Override Price.
  - column: RAISE6SECAPCFLAG
    data_type: SMALLINT
    comment: RAISE 6SEC APC Flag.
  - column: RAISE60SECRRP
    data_type: DECIMAL(15,5)
    comment: RAISE 60SEC Regional Reference Price.
  - column: RAISE60SECROP
    data_type: DECIMAL(15,5)
    comment: RAISE 60SEC Regional Override Price.
  - column: RAISE60SECAPCFLAG
    data_type: SMALLINT
    comment: RAISE 60SEC APC Flag.
  - column: RAISE5MINRRP
    data_type: DECIMAL(15,5)
    comment: RAISE 5MIN Regional Reference Price.
  - column: RAISE5MINROP
    data_type: DECIMAL(15,5)
    comment: RAISE 5MIN Regional Override Price.
  - column: RAISE5MINAPCFLAG
    data_type: SMALLINT
    comment: RAISE 5MIN APC Flag.
  - column: RAISEREGRRP
    data_type: DECIMAL(15,5)
    comment: RAISE REG Regional Reference Price.
  - column: RAISEREGROP
    data_type: DECIMAL(15,5)
    comment: RAISE REG Regional Override Price.
  - column: RAISEREGAPCFLAG
    data_type: SMALLINT
