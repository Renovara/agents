P5MIN_REGIONSOLUTION:
  table_name: silver_p5_reports_p5min_regionsolution
  display_name: P5Min Regionsolution
  table_comment: The five-minute predispatch (P5Min) system provides projected dispatch for 12 dispatch
    cycles (one hour). This table shows regional capacity, maximum surplus reserve, and maximum spare
    capacity evaluations for each period.
  primary_keys:
  - INTERVAL_DATETIME
  - REGIONID
  - RUN_DATETIME
  indexes:
  - LASTCHANGED
  visibility: Public
  update_frequency: Daily
  schema:
  - column: RUN_DATETIME
    data_type: string
    comment: Unique timestamp identifier for this study
  - column: INTERVAL_DATETIME
    data_type: string
    comment: Unique identifier for the interval within this study
  - column: REGIONID
    data_type: string
    comment: Region identifier
  - column: RRP
    data_type: decimal(15,5)
    comment: Region Reference Price (Energy)
  - column: ROP
    data_type: decimal(15,5)
    comment: Region Override Price (Energy)
  - column: EXCESSGENERATION
    data_type: decimal(15,5)
    comment: Total energy imbalance (MW)
  - column: RAISE6SECRRP
    data_type: decimal(15,5)
    comment: Region Reference Price (Raise 6 Sec)
  - column: RAISE6SECROP
    data_type: decimal(15,5)
    comment: Original regional price (Raise 6 Sec)
  - column: RAISE60SECRRP
    data_type: decimal(15,5)
    comment: Region Reference Price (Raise 60 Sec)
  - column: RAISE60SECROP
    data_type: decimal(15,5)
    comment: Original regional price (Raise 60 Sec)
  - column: RAISE5MINRRP
    data_type: decimal(15,5)
    comment: Region Reference Price (Raise 5 Min)
  - column: RAISE5MINROP
    data_type: decimal(15,5)
    comment: Original regional price (Raise 5 Min)
  - column: RAISEREGRRP
    data_type: decimal(15,5)
    comment: Region Reference Price (Raise Regulation)
  - column: RAISEREGROP
    data_type: decimal(15,5)
    comment: Original regional price (Raise Regulation)
  - column: LOWER6SECRRP
    data_type: decimal(15,5)
    comment: Region Reference Price (Lower 6 Sec)
  - column: LOWER6SECROP
    data_type: decimal(15,5)
    comment: Original regional price (Lower 6 Sec)
  - column: LOWER60SECRRP
    data_type: decimal(15,5)
    comment: Region Reference Price (Lower 60 Sec)
  - column: LOWER60SECROP
    data_type: decimal(15,5)
    comment: Original regional price (Lower 60 Sec)
  - column: LOWER5MINRRP
    data_type: decimal(15,5)
    comment: Region Reference Price (Lower 5 Min)
  - column: LOWER5MINROP
    data_type: decimal(15,5)
    comment: Original regional price (Lower 5 Min)
  - column: LOWERREGRRP
    data_type: decimal(15,5)
    comment: Region Reference Price (Lower Regulation)
  - column: LOWERREGROP
    data_type: decimal(15,5)
    comment: Original regional price (Lower Regulation)
  - column: TOTALDEMAND
    data_type: decimal(15,5)
    comment: Regional demand (not net of interconnector flows or loads)
  - column: AVAILABLEGENERATION
    data_type: decimal(15,5)
    comment: Regional available generation
  - column: AVAILABLELOAD
    data_type: decimal(15,5)
    comment: Regional available load
  - column: DEMANDFORECAST
    data_type: decimal(15,5)
    comment: Predicted change in regional demand for this interval
  - column: DISPATCHABLEGENERATION
    data_type: decimal(15,5)
    comment: Regional dispatched generation
  - column: DISPATCHABLELOAD
    data_type: decimal(15,5)
