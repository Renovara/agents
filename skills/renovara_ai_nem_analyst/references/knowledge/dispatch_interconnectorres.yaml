DISPATCH_INTERCONNECTORRES:
  table_name: silver_dispatchis_reports_dispatch_interconnectorres
  display_name: Dispatch Interconnectorres
  table_comment: DISPATCHINTERCONNECTORRES sets out MW flow and losses on each interconnector for each
    dispatch period, including fields for the Frequency Controlled Ancillary Services export and import
    limits and extra reporting of the generic constraints that set the energy import and export limits.
  primary_keys:
  - DISPATCHINTERVAL
  - INTERCONNECTORID
  - INTERVENTION
  - RUNNO
  - SETTLEMENTDATE
  indexes:
  - LASTCHANGED
  visibility: Public
  update_frequency: Every 5 minutes
  schema:
  - column: SETTLEMENTDATE
    data_type: string
    comment: Market date starting at 04:05 (parsed to timestamp in silver). Timestamp is in AEST or Australia/Brisbane.
  - column: RUNNO
    data_type: smallint
    comment: Dispatch run no; always 1
  - column: INTERCONNECTORID
    data_type: string
    comment: Interconnector identifier
  - column: DISPATCHINTERVAL
    data_type: bigint
    comment: Dispatch period identifier, from 001 to 288 in format YYYYMMDDPPP.
  - column: INTERVENTION
    data_type: tinyint
    comment: Intervention case or not
  - column: METEREDMWFLOW
    data_type: decimal(15,5)
    comment: Metered MW Flow from SCADA.
  - column: MWFLOW
    data_type: decimal(15,5)
    comment: Target MW Flow for next 5 mins.
  - column: MWLOSSES
    data_type: decimal(15,5)
    comment: Calculated MW Losses
  - column: MARGINALVALUE
    data_type: decimal(15,5)
    comment: Shadow price resulting from thermal or reserve sharing constraints on Interconnector import/export
      (0 unless binding).
  - column: VIOLATIONDEGREE
    data_type: decimal(15,5)
    comment: Degree of violation on interconnector constraints
  - column: LASTCHANGED
    data_type: string
    comment: Last changed.
  - column: EXPORTLIMIT
    data_type: decimal(15,5)
    comment: Calculated export limit applying to energy only.
  - column: IMPORTLIMIT
    data_type: decimal(15,5)
    comment: Calculated import limit applying to energy only.
  - column: MARGINALLOSS
    data_type: decimal(15,5)
    comment: Marginal loss factor. Use this to adjust prices between regions.
  - column: EXPORTGENCONID
    data_type: string
    comment: Generic Constraint setting the export limit
  - column: IMPORTGENCONID
    data_type: string
    comment: Generic Constraint setting the import limit
  - column: FCASEXPORTLIMIT
    data_type: decimal(15,5)
    comment: Calculated export limit applying to energy + FCAS.
  - column: FCASIMPORTLIMIT
    data_type: decimal(15,5)
    comment: Calculated import limit applying to energy + FCAS.
  - column: LOCAL_PRICE_ADJUSTMENT_EXPORT
    data_type: decimal(10,2)
    comment: Aggregate Constraint contribution cost of this Interconnector for Export.
  - column: LOCALLY_CONSTRAINED_EXPORT
    data_type: tinyint
    comment: 2 = at least one Outage Constraint; 1 = at least 1 System Normal Constraint (and no Outage
      Constraint); 0 = No System Normal or Outage Constraints
  - column: LOCAL_PRICE_ADJUSTMENT_IMPORT
    data_type: decimal(10,2)
    comment: Aggregate Constraint contribution cost of this Interconnector for Import.
  - column: LOCALLY_CONSTRAINED_IMPORT
    data_type: tinyint
    comment: 2 = at least one Outage Constraint; 1 = at least 1 System Normal Constraint (and no Outage
      Constraint); 0 = No System Normal or Outage Constraints
