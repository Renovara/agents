SPDRC:
  table_name: silver___spdrc
  display_name: Spdrc
  table_comment: SPDREGIONCONSTRAINT contains the LHS factor terms applied to aggregated regional gen/load
    by generic constraints in dispatch. A non-zero FACTOR for a (CONSTRAINTID, EFFECTIVEDATE, VERSIONNO,
    REGIONID, BIDTYPE) tuple means the constraint targets the region's aggregate — every unit in that
    region participates in the limit, so a DUID is indirectly affected if its region appears here for
    the constraint version that was binding.
  primary_keys:
  - BIDTYPE
  - EFFECTIVEDATE
  - GENCONID
  - REGIONID
  - VERSIONNO
  indexes:
  - LASTCHANGED
  visibility: Public
  update_frequency: Monthly
  schema:
  - column: REGIONID
    data_type: string
    comment: Region identifier (e.g. NSW1, QLD1, VIC1, SA1, TAS1)
  - column: EFFECTIVEDATE
    data_type: string
    comment: Effective date of this record
  - column: VERSIONNO
    data_type: smallint
    comment: Version number for the effective date
  - column: GENCONID
    data_type: string
    comment: Generic constraint identifier (synonymous with CONSTRAINTID in DISPATCH_CONSTRAINT)
  - column: BIDTYPE
    data_type: string
    comment: 'Bid type the factor applies to: ENERGY, RAISE6SEC, RAISE60SEC, RAISE5MIN, LOWER6SEC, LOWER60SEC,
      LOWER5MIN, RAISEREG, LOWERREG'
  - column: FACTOR
    data_type: decimal(16,6)
    comment: Constraint factor on the region aggregate's contribution to the LHS (typically -1 or 1)
  - column: LASTCHANGED
    data_type: string
    comment: Last date and time record changed
