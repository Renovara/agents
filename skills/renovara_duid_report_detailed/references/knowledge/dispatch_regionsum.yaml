DISPATCH_REGIONSUM:
  table_name: silver_dispatchis_reports_dispatch_regionsum
  display_name: Dispatch Regionsum
  table_comment: DISPATCHREGIONSUM sets out the 5-minute solution for each dispatch run for each region,
    including Frequency Control Ancillary Services (FCAS) data, demand, generation, and semi-scheduled
    forecasts. Includes legacy FCAS requirement and price fields that are no longer used since December
    2003 but retained for completeness.
  primary_keys:
  - DISPATCHINTERVAL
  - INTERVENTION
  - REGIONID
  - RUNNO
  - SETTLEMENTDATE
  indexes:
  - LASTCHANGED
  visibility: Public
  update_frequency: Every 5 minutes
  schema:
  - column: SETTLEMENTDATE
    data_type: STRING
    comment: Market date and time (parsed to timestamp in silver). Timestamp is in AEST or Australia/Brisbane.
  - column: RUNNO
    data_type: SMALLINT
    comment: Dispatch run no; always 1
  - column: REGIONID
    data_type: STRING
    comment: Region Identifier
  - column: DISPATCHINTERVAL
    data_type: BIGINT
    comment: Dispatch period identifier, from 001 to 288 in format YYYYMMDDPPP.
  - column: INTERVENTION
    data_type: TINYINT
    comment: Manual Intervention flag
  - column: TOTALDEMAND
    data_type: DECIMAL(15,5)
    comment: Demand (less loads)
  - column: AVAILABLEGENERATION
    data_type: DECIMAL(15,5)
    comment: Aggregate generation bid available in region
  - column: AVAILABLELOAD
    data_type: DECIMAL(15,5)
    comment: Aggregate load bid available in region
  - column: DEMANDFORECAST
    data_type: DECIMAL(15,5)
    comment: 5-minute demand forecast adjustment
  - column: DISPATCHABLEGENERATION
    data_type: DECIMAL(15,5)
    comment: Dispatched Generation
  - column: DISPATCHABLELOAD
    data_type: DECIMAL(15,5)
    comment: Dispatched Load (add to total demand to get inherent region demand)
  - column: NETINTERCHANGE
    data_type: DECIMAL(15,5)
    comment: Net interconnector flow from the regional reference node
  - column: EXCESSGENERATION
    data_type: DECIMAL(15,5)
    comment: MW quantity of excess generation
  - column: LOWER6SECDISPATCH
    data_type: DECIMAL(15,5)
    comment: Lower 6SEC Dispatch (Not used since Dec 2003).
  - column: LOWER6SECIMPORT
    data_type: DECIMAL(15,5)
    comment: Lower 6SEC Import (Not used since Dec 2003).
  - column: LOWER6SECLOCALDISPATCH
    data_type: DECIMAL(15,5)
    comment: Lower 6SEC Localdispatch (Not used since Dec 2003).
  - column: LOWER6SECLOCALPRICE
    data_type: DECIMAL(15,5)
    comment: Lower 6SEC Localprice (Not used since Dec 2003).
