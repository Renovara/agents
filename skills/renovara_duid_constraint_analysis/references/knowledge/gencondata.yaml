GENCONDATA:
  table_name: silver___gencondata
  display_name: Gencondata
  table_comment: GENCONDATA contains the catalogue of generic constraints used in PASA, predispatch, and
    dispatch processes. Each row is a versioned constraint definition keyed by GENCONID + EFFECTIVEDATE
    + VERSIONNO, with descriptive fields (DESCRIPTION, REASON, LIMITTYPE, IMPACT, SOURCE) explaining what
    the constraint represents and applicability flags for each market process.
  primary_keys:
  - EFFECTIVEDATE
  - GENCONID
  - VERSIONNO
  indexes:
  - LASTCHANGED
  visibility: Public
  update_frequency: Monthly
  schema:
  - column: EFFECTIVEDATE
    data_type: string
    comment: Effective date of constraint
  - column: VERSIONNO
    data_type: smallint
    comment: Version number relative to effective date
  - column: GENCONID
    data_type: string
    comment: Unique generic constraint identifier (synonymous with CONSTRAINTID in DISPATCH_CONSTRAINT)
  - column: CONSTRAINTTYPE
    data_type: string
    comment: Logical operator applied to the constraint (=, >=, <=)
  - column: CONSTRAINTVALUE
    data_type: decimal(16,6)
    comment: Static RHS value when no dynamic RHS definition exists
  - column: DESCRIPTION
    data_type: string
    comment: Detail of affected plant or service status
  - column: STATUS
    data_type: string
    comment: Unused field
  - column: GENERICCONSTRAINTWEIGHT
    data_type: decimal(16,6)
    comment: Violation penalty factor
  - column: AUTHORISEDDATE
    data_type: string
    comment: Authorisation date for this constraint version
  - column: AUTHORISEDBY
    data_type: string
    comment: Authorising user
  - column: DYNAMICRHS
    data_type: decimal(15,5)
    comment: Unused field
  - column: LASTCHANGED
    data_type: string
    comment: Last date and time record changed
  - column: DISPATCH
    data_type: string
    comment: Dispatch applicability flag (1 = applies to dispatch, 0 = does not)
  - column: PREDISPATCH
    data_type: string
    comment: Pre-dispatch applicability flag (1/0)
  - column: STPASA
    data_type: string
    comment: Short-term PASA applicability flag (1/0)
  - column: MTPASA
    data_type: string
    comment: Medium-term PASA applicability flag (1/0)
  - column: IMPACT
    data_type: string
    comment: Affected devices or systems
  - column: SOURCE
    data_type: string
    comment: Formulation source of the constraint
  - column: LIMITTYPE
    data_type: string
    comment: Constraint category (e.g. Stability, Voltage, Thermal)
  - column: REASON
    data_type: string
    comment: Contingency or justification for the constraint
  - column: MODIFICATIONS
    data_type: string
    comment: Version change details
  - column: ADDITIONALNOTES
    data_type: string
    comment: Supplementary constraint notes
  - column: P5MIN_SCOPE_OVERRIDE
    data_type: string
    comment: RHS definition scope indicator for the 5-minute pre-dispatch run
  - column: LRC
    data_type: string
    comment: LRC PASA run applicability flag (1/0)
  - column: LOR
    data_type: string
    comment: LOR PASA run applicability flag (1/0)
  - column: FORCE_SCADA
    data_type: tinyint
    comment: Intervention pricing value selection flag
