PREDISPATCH_REGION_SOLUTION:
  table_name: silver_predispatchis_reports_predispatch_region_solution
  display_name: Predispatch Region Solution
  table_comment: 'PREDISPATCH_REGION_SOLUTION sets out the overall regional Pre-Dispatch results for

    base case details (excluding price). It includes forecast demand (total demand)

    and FCAS requirements (Raise Regulation and Lower Regulation), and updates

    every thirty minutes with the latest Pre-Dispatch details for remaining

    periods. Regional demand can be calculated as:

    Regional demand = TotalDemand + DispatchableLoad.'
  primary_keys:
  - DATETIME
  - REGIONID
  indexes:
  - LASTCHANGED
  - PREDISPATCHSEQNO
  visibility: Public
  update_frequency: Daily
  schema:
  - column: PREDISPATCHSEQNO
    data_type: string
    comment: Unique identifier of predispatch run in the form YYYYMMDDPP with 01 at 04:30
  - column: RUNNO
    data_type: smallint
    comment: LP Solver Pre-Dispatch run no, typically 1; increments if the case is re-run
  - column: REGIONID
    data_type: string
    comment: Unique region identifier
  - column: PERIODID
    data_type: string
    comment: Period count starting from 1 for each Pre-Dispatch run. Use DATETIME to determine half hour
      period.
  - column: INTERVENTION
    data_type: tinyint
    comment: Flag indicating if result set was sourced from pricing or physical run. 0 = pricing run;
      1 = physical run. If no intervention, both runs correspond to 0.
  - column: TOTALDEMAND
    data_type: decimal(15,5)
    comment: Total demand in MW for period (less normally on loads)
  - column: AVAILABLEGENERATION
    data_type: decimal(15,5)
    comment: Aggregate generation bid available in region
  - column: AVAILABLELOAD
    data_type: decimal(15,5)
    comment: Aggregate load bid available in region
  - column: DEMANDFORECAST
    data_type: decimal(15,5)
    comment: Delta MW value only
  - column: DISPATCHABLEGENERATION
    data_type: decimal(15,5)
    comment: Generation dispatched in period
  - column: DISPATCHABLELOAD
    data_type: decimal(15,5)
    comment: Load dispatched in period
  - column: NETINTERCHANGE
    data_type: decimal(15,5)
    comment: Net interconnector flow from the regional reference node
  - column: EXCESSGENERATION
    data_type: decimal(15,5)
    comment: Excess generation in period / deficit generation if VOLL
  - column: LOWER5MINDISPATCH
    data_type: decimal(15,5)
    comment: Not used since Dec 2003. Lower 5 min MW dispatch
  - column: LOWER5MINIMPORT
    data_type: decimal(15,5)
    comment: Not used since Dec 2003. Lower 5 min MW imported
  - column: LOWER5MINLOCALDISPATCH
    data_type: decimal(15,5)
    comment: Lower 5 min local dispatch
  - column: LOWER5MINLOCALPRICE
    data_type: decimal(15,5)
    comment: Not used since Dec 2003. Local price of lower 5 min
  - column: LOWER5MINLOCALREQ
    data_type: decimal(15,5)
    comment: Not used since Dec 2003. Lower 5 min local requirement
